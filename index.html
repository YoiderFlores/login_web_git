<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card{
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 280px;
        }
        .login-card h2{
            margin-top: 0;
            text-align: center;
        }
        .form-group{
            margin-bottom: 12px;
        }
        label{
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
        }
        input{
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button{
            width: 100%;
            padding: 10px;
            border: none;
            background: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;

        }
        button:hover{
            background: #0056b3;
        }

    </style>
</head>
<body>
    <div class="login-card">
        <h2>Iniciar Sesion</h2>
        <form action="">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="text" id="password" name="password" required>
            </div>
            <button type="submit">Ingresar al sistema</button>
        </form>
        <p style="font-size: 12px;text-align: center;">
            <a href="#">¿Olvidaste tu contra mi king?</a>
        </p>
    </div>
</body>
</html>
